# TODO: add papers by configuration file
base_url: "https://arxiv.paperswithcode.com/api/v0/papers/"
user_name: "liyaowei-stu"
repo_name: "cv-arxiv-daily"
show_authors: True
show_links: True
show_badge: True
max_results: 10

publish_readme: True
publish_gitpage: True
publish_wechat: False

# file paths
json_readme_path: './docs/cv-arxiv-daily.json'
json_gitpage_path: './docs/cv-arxiv-daily-web.json'
json_wechat_path: './docs/cv-arxiv-daily-wechat.json'

md_readme_path: 'README.md'
md_gitpage_path: './docs/index.md'
md_wechat_path: './docs/wechat.md'

# keywords to search
keywords:
    "World Model":
        filters: ["World Model", "Generative World Model",
                  "Latent World Model", "Predictive World Model"]

    "Multimodal Foundation Model":
        filters: ["Multimodal Model", "Vision-Language Model",
                  "Vision-Language-Action", "VLA",
                  "Foundation Model"]

    "Diffusion & Flow":
        filters: ["Diffusion Model", "Video Diffusion",
                  "Flow Matching", "Rectified Flow",
                  "Consistency Model"]

    "Embodied / Agent":
        filters: ["Embodied AI", "Action-conditioned Generation",
                  "World Model for Control",
                  "Policy Learning from Video"]
